# yield-classifier categories.yaml
# Source-of-truth for category -> per-platform tier mapping.
# Derived from FUTURE-SURVEYS.md (last reconciled 2026-06-09) and tome/platforms/*.json.
#
# Tier vocabulary:
#   A     no auth concept (open by design) - high yield, EXPOSED-DOMINANT
#   A*    auth optional, off by default     - mixed yield, EXPOSURE-LIKELY
#   B     setup-wizard / version-load-bearing - mixed yield, MIXED
#   C     auth on by default                - hardened, NEGATIVE-RESULT-LIKELY
#   n/a   CLI-only / no server surface      - excluded from yield math
#
# status: not-yet | partial | done | done-negative
# goal: exposure | thesis | both
#
# Schema (per category):
# - slug:           short kebab-case ID, also CLI argument
#   name:           human label
#   status:         survey status
#   platforms:      list of {name, tier} pairs
#   notes:          one-line headline finding or rationale
#   alt_ports:      optional Shodan-dark ports needing tiptoe/zgrab2

