# -----------------------------------------------------------------------------
# Refresh procedure (reproducible):
#   1. curl the served_path favicon from the vendor repo at HEAD; record SHA+date.
#   2. shodan_mmh3 = mmh3.hash(base64.encodebytes(bytes)); censys_md5 = md5(bytes).
#   3. Cross-check the mmh3 against `jaxen` (murmur3Hash32) before trusting it.
#   4. Append the new hash to the product's list (keep old hashes for back-coverage).
# -----------------------------------------------------------------------------
